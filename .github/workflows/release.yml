name: 🚀 Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  ci:
    name: 🔍 CI checks
    uses: ./.github/workflows/ci.yml

  release:
    name: 📦 Publish release
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: write
      models: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-frontend-${{ hashFiles('frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-frontend-

      - name: 📦 Install frontend dependencies
        run: npm install --prefix frontend

      - name: 🏗️ Build frontend
        run: npm run build --prefix frontend

      - name: 🗜️ Package frontend artifact
        run: |
          VERSION="${GITHUB_REF_NAME}"
          tar -czf "pingflare-frontend-${VERSION}.tar.gz" -C frontend build

      - name: 🔖 Determine prerelease flag
        id: prerelease
        run: |
          TAG="${GITHUB_REF_NAME}"
          if echo "$TAG" | grep -qE '\-(rc|beta|alpha)'; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 📋 Get commits since last tag
        id: commits
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            LOG=$(git log --pretty=format:"%s (%h)" HEAD)
          else
            LOG=$(git log --pretty=format:"%s (%h)" "$PREVIOUS_TAG"..HEAD)
          fi
          echo "LOG<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🤖 Generate release notes
        id: ai_notes
        run: |
          RESPONSE=$(curl -s https://models.inference.ai.azure.com/chat/completions \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg version "${GITHUB_REF_NAME}" \
              --arg log "${{ steps.commits.outputs.LOG }}" \
              '{
                model: "gpt-4o-mini",
                messages: [
                  {
                    role: "system",
                    content: "You are a technical writer for open source projects. Generate polished, friendly release notes in English from a list of git commits. Group changes into sections using these emojis: 🚀 New Features, 🐛 Bug Fixes, ⚡ Improvements, 💥 Breaking Changes. Omit sections with no entries. Be concise and developer-friendly. Do not include a title or version header."
                  },
                  {
                    role: "user",
                    content: ("Generate release notes for version " + $version + " from these commits:\n" + $log)
                  }
                ]
              }')")
          NOTES=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Release notes unavailable."')
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 📝 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "🎉 Pingflare ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.ai_notes.outputs.NOTES }}
          files: pingflare-frontend-${{ github.ref_name }}.tar.gz
          draft: false
          prerelease: ${{ steps.prerelease.outputs.value }}

  docker:
    name: 🐳 Build & push Docker image
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v5

      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pingflare
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: 🔨 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🚢 Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
